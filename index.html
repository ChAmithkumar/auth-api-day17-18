<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; }
        .completed { text-decoration: line-through; color: gray; }
        button { margin-left: 5px; }
    </style>
</head>
<body>

<h1>Task Manager</h1>

<!-- LOGIN -->
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<hr>

<!-- ADD TASK -->
<input id="taskInput" placeholder="New Task">

<select id="category">
    <option>Work</option>
    <option>Personal</option>
    <option>Urgent</option>
</select>

<button onclick="addTask()">Add</button>

<input id="search" placeholder="Search..." onkeyup="searchTask()">

<ul id="taskList"></ul>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const API = "https://task-maneger-day19.onrender.com/tasks";

// LOAD TASKS
async function loadTasks() {
    const res = await axios.get(API);
    const tasks = res.data;

    taskList.innerHTML = "";

    tasks.forEach(t => {
        taskList.innerHTML += `
        <li>
            ${t.title} (${t.category})
            <button onclick="editTask('${t._id}', '${t.title}')">Edit</button>
            <button onclick="deleteTask('${t._id}')">Delete</button>
        </li>`;
    });
}

// ADD TASK
async function addTask() {
    if (!taskInput.value) return;

    await axios.post(API, {
        title: taskInput.value,
        category: category.value
    });

    taskInput.value = "";
    loadTasks();
}

// DELETE
async function deleteTask(id) {
    await axios.delete(API + "/" + id);
    loadTasks();
}

// EDIT
function editTask(id, oldTitle) {
    const newTitle = prompt("Edit task:", oldTitle);
    if (!newTitle) return;

    axios.put(API + "/" + id, { title: newTitle })
    .then(() => loadTasks());
}

// SEARCH
function searchTask() {
    const value = search.value.toLowerCase();

    document.querySelectorAll("#taskList li").forEach(li => {
        li.style.display =
            li.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

// AUTO LOAD
loadTasks();
</script>
</body>
</html>
