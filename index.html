<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Signup</h2>
<input id="signupName" placeholder="Name">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="lemail" placeholder="Email">
<input id="lpass" placeholder="Password">
<button onclick="login()">Login</button>

<button onclick="logout()">Logout</button>

<h2>Add User</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<button onclick="addUser()">Add</button>

<input id="search" placeholder="Search" onkeyup="searchUser()">

<table border="1">
<tbody id="table"></tbody>
<button onclick="editUser('${u._id}')">Edit</button>
<button onclick="fetchUsersDemo()">Test Fetch API</button>
</table>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const API = "https://auth-api-tvca.onrender.com";

// SIGNUP
function signup() {
    axios.post(API + "/signup", {
        name: signupName.value,
        email: signupEmail.value,
        password: signupPassword.value
    })
    .then(() => alert("Signup successful"))
    .catch(err => alert(err.response?.data?.msg || "Error"));
}

// LOGIN ✅ FIXED IDS
function login() {
    axios.post(API + "/login", {
        email: lemail.value,
        password: lpass.value
    })
    .then(res => {
        localStorage.setItem("token", res.data.token);
        alert("Login successful");
        getUsers();
    })
    .catch(() => alert("Login failed"));
}

// GET USERS
function getUsers() {
    axios.get(API + "/users", {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => {
        table.innerHTML = "";
        res.data.forEach(u => {
            table.innerHTML += `
            <tr>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>
                    <button onclick="editUser('${u._id}')">Edit</button>
                    <button onclick="del('${u._id}')">Delete</button>
                </td>
            </tr>`; 
        });
    });
}

// ADD USER ✅ TOKEN ADDED
function addUser() {
    axios.post(API + "/users", {
        name: name.value,
        email: email.value
    }, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => getUsers());
}

// DELETE USER ✅ TOKEN ADDED
function del(id) {
    axios.delete(API + "/users/" + id, {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(() => getUsers());
}

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    alert("Logged out");
    location.reload();
}

// SEARCH ✅ FIXED TABLE ID
function searchUser() {
    const value = search.value.toLowerCase();

    document.querySelectorAll("#table tr").forEach(row => {
        row.style.display =
            row.innerText.toLowerCase().includes(value) ? "" : "none";
    });
}

function editUser(id) {
    const newName = prompt("Enter new name:");
    if (!newName) return;

    axios.put(API + "/users/" + id,
        { name: newName },
        {
            headers: {
                Authorization: "Bearer " + localStorage.getItem("token")
            }
        }
    )
    .then(res => {
        console.log("Updated:", res.data); // debug
        getUsers(); // refresh table
    })
    .catch(err => console.error(err));
}

// ✅ FETCH API EXAMPLE
function fetchUsersDemo() {
    fetch(API + "/users", {
        headers: {
            Authorization: "Bearer " + localStorage.getItem("token")
        }
    })
    .then(res => res.json())
    .then(data => console.log("Fetch Users:", data))
    .catch(err => console.error(err));
}
</script>

</body>
</html>
